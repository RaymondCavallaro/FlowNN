<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wave NN</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Simulation controls">
        <div class="brand">
          <span class="mark"></span>
          <div>
            <h1>Wave NN</h1>
            <p>Pressure-shaped signal routing</p>
          </div>
        </div>

        <div class="controls">
          <button id="playToggle" class="icon-button" title="Pause simulation" aria-label="Pause simulation">
            <span id="playIcon">II</span>
          </button>
          <button id="trainButton" class="icon-button" title="Inject training example" aria-label="Inject training example">+</button>
          <button id="resetButton" class="icon-button" title="Reset network" aria-label="Reset network">R</button>
          <label>
            <span>Op</span>
            <select id="operationSelect">
              <option value="xor">XOR</option>
              <option value="and">AND</option>
              <option value="or">OR</option>
              <option value="nand">NAND</option>
            </select>
          </label>
          <div class="signal-buttons" aria-label="Manual signal injection">
            <button data-signal="zero" title="Inject 0 signal">0</button>
            <button data-signal="one" title="Inject 1 signal">1</button>
            <button data-signal="tighten" title="Tighten all valves">T</button>
            <button data-signal="loosen" title="Loosen all valves">L</button>
          </div>
          <label>
            <span>Rate</span>
            <input id="rateSlider" type="range" min="0.4" max="6" value="2.2" step="0.1" />
          </label>
          <label>
            <span>Pulse</span>
            <select id="pulseModeSelect">
              <option value="wait">Wait</option>
              <option value="clock">Clock</option>
            </select>
          </label>
          <label>
            <span>Learning</span>
            <input id="learningSlider" type="range" min="0" max="1" value="0.55" step="0.01" />
          </label>
          <label class="toggle">
            <input id="autoPulse" type="checkbox" checked />
            <span>Auto pulse</span>
          </label>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="stage" width="1280" height="760" aria-label="Wave neural network simulation"></canvas>
        <aside class="meter-panel" aria-label="Simulation metrics">
          <div>
            <span>Signal</span>
            <strong id="signalMetric">0.00</strong>
          </div>
          <div>
            <span>Pressure</span>
            <strong id="pressureMetric">0.00</strong>
          </div>
          <div>
            <span>Spread</span>
            <strong id="spreadMetric">0</strong>
          </div>
          <div>
            <span>Valves</span>
            <strong id="valveMetric">0</strong>
          </div>
          <div>
            <span>Accuracy</span>
            <strong id="accuracyMetric">0%</strong>
          </div>
          <div>
            <span>Op</span>
            <strong id="opMetric">XOR</strong>
          </div>
          <div>
            <span>Pulse</span>
            <strong id="pulseMetric">Wait</strong>
          </div>
          <div>
            <span>Control</span>
            <strong id="controlMetric">0.00</strong>
          </div>
        </aside>
        <aside id="inspector" class="inspector" aria-label="Node and valve inspection">
          <h2>Inspector</h2>
          <p>Click a node or valve.</p>
        </aside>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
